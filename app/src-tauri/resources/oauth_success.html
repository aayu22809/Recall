<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Recall — Connected</title>
    <style>
      :root { color-scheme: dark; }
      html, body {
        margin: 0;
        padding: 0;
        background: #0e0f12;
        color: #e6e6e6;
        font: 15px/1.5 -apple-system, "SF Pro Text", "Inter", system-ui, sans-serif;
        height: 100vh;
        display: grid;
        place-items: center;
      }
      .card {
        text-align: center;
        padding: 32px 40px;
        border: 1px solid #23262d;
        border-radius: 12px;
        background: #15171b;
        max-width: 360px;
      }
      h1 { font-size: 18px; font-weight: 600; margin: 0 0 8px; }
      p  { margin: 0; color: #8a8f98; font-size: 14px; }
      .dot { width: 6px; height: 6px; border-radius: 50%; background: #7b8cf0; display: inline-block; margin-right: 8px; vertical-align: middle; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1><span class="dot"></span>Connected</h1>
      <p>You can close this tab and return to Recall.</p>
    </div>
  </body>
</html>
